name: transpop_mobile
description: "Transpop - HR Mobility Orchestration Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^14.8.1

  # HTTP & networking
  dio: ^5.7.0
  connectivity_plus: ^6.1.1
  socket_io_client: ^3.0.2

  # Maps
  google_maps_flutter: ^2.10.0

  # Push notifications
  firebase_core: ^3.9.0
  firebase_messaging: ^15.2.0

  # Local storage & offline
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  sqflite: ^2.4.1
  path: ^1.9.0
  path_provider: ^2.1.5

  # Security
  flutter_secure_storage: ^9.2.4

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0

  # Utils
  intl: ^0.19.0
  logger: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  # Inter font loaded via google_fonts package at runtime
  # To bundle fonts for offline, add .ttf files to assets/fonts/ and uncomment:
  # fonts:
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
