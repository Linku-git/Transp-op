version: "3.1"

rules:

- rule: greeting
  steps:
    - intent: greet
    - action: utter_greet

- rule: goodbye
  steps:
    - intent: goodbye
    - action: utter_goodbye

- rule: help
  steps:
    - intent: help
    - action: utter_help

- rule: fallback
  steps:
    - intent: nlu_fallback
    - action: utter_ask_rephrase
