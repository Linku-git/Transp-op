name: CI

on:
  push:
    branches: [main, "feature/**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_USER: transpop
          POSTGRES_PASSWORD: transpop_test
          POSTGRES_DB: transpop_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://transpop:transpop_test@localhost:5432/transpop_test
      DATABASE_URL_SYNC: postgresql+psycopg2://transpop:transpop_test@localhost:5432/transpop_test
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-test-secret-key
      ENVIRONMENT: testing
      TESTING: "1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: |
          cd backend
          pip install ruff
          ruff check app/ tests/

      - name: Type check (mypy)
        run: |
          cd backend
          pip install mypy
          mypy app/ --ignore-missing-imports || true

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short

  frontend:
    name: Frontend (React/TypeScript)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Lint (eslint)
        run: |
          cd frontend
          npx eslint . || true

      - name: Type check (tsc)
        run: |
          cd frontend
          npx tsc -b --noEmit

      - name: Run tests
        run: |
          cd frontend
          npx vitest run
